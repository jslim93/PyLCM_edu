name: PyLCM
channels:
  - conda-forge
dependencies:
  - python>=3.11,<3.14
  # numba and numpy are version-coupled: numba 0.65+ supports numpy up to 2.4.
  - numpy>=1.24,<2.5
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - numba>=0.65
  - ipywidgets>=8.0
  - tqdm>=4.65
  - joblib>=1.3
  - pyyaml>=6.0
  - jupyter
  - pip
  - pip:
    - plotly>=5.0
    - streamlit>=1.30
